server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to the entry document so
    # deep links (e.g. /decks/:id/study) load instead of 404ing.
    # Security headers are set here because nginx add_header is not inherited by
    # child location blocks that define their own add_header directives.
    # frame-src covers Firebase's hidden auth iframe (https://<proj>.firebaseapp.com/__/auth/iframe)
    # and Google's OAuth popup (https://accounts.google.com/...).
    # No-cache here so the SPA fallback (any deep link served as index.html) is
    # always revalidated — otherwise a stale index.html could keep pointing at an
    # old, since-deleted /assets/ bundle after a deploy. Fingerprinted bundles
    # under /assets/ are still cached hard (immutable) by the block below.
    # 'unsafe-inline' in script-src is required by Vite's tiny inline module
    # preload/runtime shim in index.html; style-src needs it for runtime-injected
    # styles. Scope is otherwise locked to self + Firebase/Google auth origins.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.catflashcards.com https://*.googleapis.com https://*.firebaseapp.com; frame-src https://*.firebaseapp.com https://accounts.google.com; frame-ancestors 'none'" always;
    }

    # Fingerprinted assets are immutable — cache them hard. No HTML here so
    # CSP is not needed; security headers still cover MIME sniffing.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Direct access to /index.html (e.g. during Vite dev server proxying).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.catflashcards.com https://*.googleapis.com https://*.firebaseapp.com; frame-src https://*.firebaseapp.com https://accounts.google.com; frame-ancestors 'none'" always;
    }
}
