server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to the entry document so
    # deep links (e.g. /decks/:id/study) load instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets are immutable — cache them hard. The HTML entry must
    # stay uncached so a new deploy is picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
