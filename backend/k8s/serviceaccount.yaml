# Workload Identity: bind this K8s ServiceAccount to a GCP Service Account.
#
# 1. Create GCP SA:
#    gcloud iam service-accounts create cld-anki-backend \
#      --project=cld-anki
#
# 2. Grant roles:
#    gcloud projects add-iam-policy-binding cld-anki \
#      --member="serviceAccount:cld-anki-backend@cld-anki.iam.gserviceaccount.com" \
#      --role="roles/cloudsql.client"
#
#    gcloud projects add-iam-policy-binding cld-anki \
#      --member="serviceAccount:cld-anki-backend@cld-anki.iam.gserviceaccount.com" \
#      --role="roles/firebase.sdkAdminServiceAgent"
#
# 3. Bind K8s SA → GCP SA:
#    gcloud iam service-accounts add-iam-policy-binding \
#      cld-anki-backend@cld-anki.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="serviceAccount:cld-anki.svc.id.goog[cld-anki/cld-anki-backend]"

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cld-anki-backend
  namespace: cld-anki
  annotations:
    iam.gke.io/gcp-service-account: cld-anki-backend@cld-anki.iam.gserviceaccount.com
