# Run once per migration:
#   kubectl apply -f k8s/migration-job.yaml
#   kubectl wait --for=condition=complete job/cld-anki-migrate -n cld-anki
#   kubectl delete -f k8s/migration-job.yaml

apiVersion: batch/v1
kind: Job
metadata:
  name: cld-anki-migrate
  namespace: cld-anki
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: cld-anki-backend
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              psql "$DATABASE_URL" -f /migrations/001_initial.up.sql
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cld-anki-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--port=5432"
            - "cld-anki:europe-west1:cld-anki-db"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
      volumes:
        - name: migrations
          configMap:
            name: cld-anki-migrations
