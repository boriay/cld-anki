name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: ubuntu-latest

    # The Android Gradle project lives in android/; run all steps from there.
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      # The google-services plugin needs google-services.json at build time, but
      # the real file is gitignored. Unit tests mock Firebase and never hit it,
      # so a structurally-valid stub (correct package_name, dummy ids) is enough.
      - name: Generate stub google-services.json
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-stub"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.catalanflashcard"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "DUMMY_KEY_FOR_CI_BUILD_ONLY" }
                ],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android/app/build/reports/tests/testDebugUnitTest/

  backend-tests:
    runs-on: ubuntu-latest

    # Postgres service container (sidecar). Backend integration tests run the
    # real sync SQL against it — mocks/SQLite can't reproduce Postgres-specific
    # behaviour like parameter type inference (the $12 42P08 sync bug).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # Probe over TCP (-h 127.0.0.1), not the unix socket: the image runs a
        # temporary socket-only server during initdb, so a socket probe can
        # report healthy before the real TCP listener is up.
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      # The seed card data (data.go) is generated from the Android source. Catch a
      # drift where someone edits the Kotlin seed but forgets to regenerate, which
      # would silently desync the web/backend default decks from Android.
      - name: Verify generated seed is up to date
        run: |
          python3 backend/scripts/gen_seed.py
          git diff --exit-code backend/internal/seed/data.go

      - name: Build and vet
        working-directory: backend
        run: |
          go build ./...
          go vet ./...

      # Integration tests are build-tagged so a plain `go test ./...` stays
      # green without a database; here we opt in with -tags=integration and
      # point them at the service container.
      - name: Run backend tests (incl. integration)
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable
        run: go test -tags=integration ./...

  web-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Validate the real deploy artifact: the multi-stage Docker build (with the
      # required VITE_* args + fail-fast check) and the nginx config that serves it.
      # Dummy values are fine — this only exercises the build path, nothing is shipped.
      - name: Docker image build (deploy path)
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=https://api.example.com \
            --build-arg VITE_FIREBASE_API_KEY=ci-dummy \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=ci.example.com \
            --build-arg VITE_FIREBASE_PROJECT_ID=ci-dummy \
            --build-arg VITE_FIREBASE_APP_ID=ci-dummy \
            -t web-static:ci .

      - name: Validate nginx config
        run: docker run --rm web-static:ci nginx -t
