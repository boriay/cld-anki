# NOTE: Service and Ingress are mutually exclusive entrypoints — apply only one.
# Currently active: LoadBalancer (direct external IP, no domain required).
# When a domain + TLS are provisioned, switch to Ingress (ingress.yaml) and
# change this Service back to `type: ClusterIP` so the API isn't exposed twice.
apiVersion: v1
kind: Service
metadata:
  name: cld-anki-backend
  namespace: cld-anki
spec:
  selector:
    app: cld-anki-backend
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
  # Preserve the client's real source IP. With the default "Cluster" policy GKE
  # SNATs the source to a node IP, and an L4 passthrough LB sets no
  # X-Forwarded-For, so the backend would see a private IP for every request and
  # geolocate the weather to the cluster's own region instead of the user's.
  # "Local" routes only to nodes running a ready pod and keeps the source IP.
  externalTrafficPolicy: Local
