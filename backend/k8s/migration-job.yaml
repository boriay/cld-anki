# Run once per migration. The Job mounts SQL from the cld-anki-migrations
# ConfigMap, so create it from the migrations/ dir first:
#   kubectl create configmap cld-anki-migrations -n cld-anki --from-file=backend/migrations/
#   kubectl apply -f k8s/migration-job.yaml
#   kubectl wait --for=condition=complete job/cld-anki-migrate -n cld-anki
#   kubectl delete -f k8s/migration-job.yaml
#   kubectl delete configmap cld-anki-migrations -n cld-anki
#
# cloud-sql-proxy runs as a native sidecar (initContainer with restartPolicy:
# Always, GKE >= 1.28). The kubelet starts it before the migrate container and
# stops it automatically once migrate exits, so the Job actually completes
# instead of hanging on a never-terminating proxy. The proxy's startup probe
# gates the main container, removing the start-up race that caused
# "connection refused" on the first migration.

apiVersion: batch/v1
kind: Job
metadata:
  name: cld-anki-migrate
  namespace: cld-anki
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: cld-anki-backend
      restartPolicy: Never
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          restartPolicy: Always # makes this a native sidecar
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "cld-anki:europe-west1:cld-anki-db"
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            periodSeconds: 1
            failureThreshold: 60
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -e
              for f in $(ls /migrations/*.up.sql | sort); do
                echo "applying $f"
                psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cld-anki-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: cld-anki-migrations
