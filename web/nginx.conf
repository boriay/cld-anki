server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to the entry document so
    # deep links (e.g. /decks/:id/study) load instead of 404ing.
    # Security headers are set here because nginx add_header is not inherited by
    # child location blocks that define their own add_header directives.
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.catflashcards.com https://*.googleapis.com https://*.firebaseapp.com" always;
    }

    # Fingerprinted assets are immutable — cache them hard. No HTML here so
    # CSP is not needed; security headers still cover MIME sniffing.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Direct access to /index.html (e.g. during Vite dev server proxying).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.catflashcards.com https://*.googleapis.com https://*.firebaseapp.com" always;
    }
}
